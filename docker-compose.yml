services:
  pwpush:
    image: pglombardo/pwpush
    restart: unless-stopped
    # port 5100 není exponován ven — dostupný pouze pro frontend uvnitř sítě

  frontend:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # pwpush je dostupný přes název služby uvnitř Docker sítě
      PWPUSH_API_BASE: http://pwpush:5100
      PWPUSH_EMAIL: ${PWPUSH_EMAIL}
      PWPUSH_TOKEN: ${PWPUSH_TOKEN}
    depends_on:
      - pwpush
