services:
  pwpush:
    image: pglombardo/pwpush
    restart: unless-stopped
    # port 5100 není exponován ven — dostupný pouze pro frontend uvnitř sítě
    volumes:
      - pwpush_data:/opt/PasswordPusher/storage

  frontend:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      # přepíše PWPUSH_API_BASE z .env.production — uvnitř Dockeru je pwpush dostupný přes název služby
      PWPUSH_API_BASE: http://pwpush:5100
    depends_on:
      - pwpush

volumes:
  pwpush_data:
