services:
  pwpush:
    image: pglombardo/pwpush
    restart: unless-stopped
    ports:
      - "5100:5100"
    volumes:
      - pwpush_data:/opt/PasswordPusher/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5100/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      PWPUSH_API_BASE: http://pwpush:5100
    depends_on:
      pwpush:
        condition: service_healthy

volumes:
  pwpush_data:
